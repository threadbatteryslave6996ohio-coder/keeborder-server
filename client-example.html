<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keeboarder WebSocket Client</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .panel {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 { margin-top: 0; }
    h2 { font-size: 1.1em; margin-top: 0; }
    input, textarea, button {
      padding: 10px;
      margin: 5px 0;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      width: 100%;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #0056b3; }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .status {
      padding: 10px;
      margin: 10px 0;
      border-radius: 4px;
      font-weight: bold;
    }
    .status.connected { background: #d4edda; color: #155724; }
    .status.disconnected { background: #f8d7da; color: #721c24; }
    .messages {
      border: 1px solid #ddd;
      border-radius: 4px;
      height: 300px;
      overflow-y: auto;
      padding: 10px;
      background: #fafafa;
      font-size: 13px;
    }
    .message {
      margin: 5px 0;
      padding: 8px;
      background: white;
      border-left: 3px solid #007bff;
      border-radius: 2px;
    }
    .message.broadcast { border-left-color: #28a745; }
    .message.personal { border-left-color: #ffc107; }
    .message.system { border-left-color: #6c757d; }
    .clients {
      border: 1px solid #ddd;
      border-radius: 4px;
      height: 200px;
      overflow-y: auto;
      padding: 10px;
    }
    .client-item {
      padding: 8px;
      margin: 5px 0;
      background: #f0f0f0;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
    }
    .client-item:hover { background: #e0e0e0; }
    .client-item.selected { background: #007bff; color: white; }
    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <h1>🎹 Keeboarder WebSocket Client</h1>
  
  <div class="container">
    <!-- Connection Panel -->
    <div class="panel">
      <h2>Connection</h2>
      <div id="status" class="status disconnected">● Disconnected</div>
      
      <input type="text" id="serverUrl" placeholder="Server URL (ws://localhost:8025/ws/chat)" value="ws://localhost:8025/ws/chat">
      <input type="text" id="clientName" placeholder="Your name" value="Client-1">
      <input type="text" id="clientId" placeholder="Client ID (auto-generated)" readonly>
      
      <button id="connectBtn" onclick="connect()">Connect</button>
      <button id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
    </div>

    <!-- Messaging Panel -->
    <div class="panel">
      <h2>Messages</h2>
      <div id="messages" class="messages"></div>
    </div>

    <!-- Send Personal Message Panel -->
    <div class="panel">
      <h2>Send Personal Message</h2>
      <div id="clients" class="clients">
        <div style="text-align: center; color: #999;">No clients connected</div>
      </div>
      <textarea id="personalContent" placeholder="Message content..." rows="3"></textarea>
      <button onclick="sendPersonal()" id="sendPersonalBtn" disabled>Send Personal Message</button>
    </div>

    <!-- Broadcast Panel -->
    <div class="panel">
      <h2>Broadcast Message</h2>
      <textarea id="broadcastContent" placeholder="Message to all..." rows="3"></textarea>
      <button onclick="sendBroadcast()" id="sendBroadcastBtn" disabled>Send Broadcast</button>
    </div>
  </div>

  <script>
    let ws = null;
    let myClientId = null;
    let connectedClients = {};

    function connect() {
      const url = document.getElementById('serverUrl').value;
      const name = document.getElementById('clientName').value;
      
      if (!name) {
        alert('Please enter your name');
        return;
      }

      ws = new WebSocket(url);
      
      ws.onopen = () => {
        setStatus('connected', 'Connected');
        document.getElementById('connectBtn').disabled = true;
        document.getElementById('disconnectBtn').disabled = false;
        document.getElementById('sendPersonalBtn').disabled = false;
        document.getElementById('sendBroadcastBtn').disabled = false;
        
        // Register
        ws.send(JSON.stringify({
          type: 'register',
          name: name
        }));
        
        addMessage('system', 'Registered with name: ' + name);
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        handleMessage(msg);
      };

      ws.onerror = (error) => {
        setStatus('disconnected', 'Error: ' + error);
        addMessage('system', 'WebSocket error: ' + error);
      };

      ws.onclose = () => {
        setStatus('disconnected', 'Disconnected');
        document.getElementById('connectBtn').disabled = false;
        document.getElementById('disconnectBtn').disabled = true;
        document.getElementById('sendPersonalBtn').disabled = true;
        document.getElementById('sendBroadcastBtn').disabled = true;
        connectedClients = {};
        updateClientList();
      };
    }

    function disconnect() {
      if (ws) {
        ws.close();
      }
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case 'registered':
          myClientId = msg.clientId;
          document.getElementById('clientId').value = myClientId;
          addMessage('system', '✓ Successfully registered with ID: ' + myClientId);
          break;
        
        case 'host_joined':
          connectedClients[msg.clientId] = msg.name;
          updateClientList();
          addMessage('system', '👤 ' + msg.name + ' joined (ID: ' + msg.clientId + ')');
          break;
        
        case 'personal':
          addMessage('personal', '💬 From ' + connectedClients[msg.fromClientId] + ':\n' + msg.content);
          break;
        
        case 'broadcast':
          addMessage('broadcast', '📢 From ' + connectedClients[msg.fromClientId] + ':\n' + msg.content);
          break;
        
        case 'error':
          addMessage('system', '⚠️ Error: ' + msg.message);
          break;
        
        default:
          addMessage('system', 'Unknown message type: ' + msg.type);
      }
    }

    function sendPersonal() {
      const selected = document.querySelector('.client-item.selected');
      if (!selected) {
        alert('Please select a client to message');
        return;
      }

      const toClientId = selected.dataset.clientId;
      const content = document.getElementById('personalContent').value;
      
      if (!content) {
        alert('Please enter a message');
        return;
      }

      ws.send(JSON.stringify({
        type: 'personal',
        clientId: myClientId,
        toClientId: toClientId,
        content: content
      }));

      addMessage('personal', '💬 To ' + connectedClients[toClientId] + ':\n' + content);
      document.getElementById('personalContent').value = '';
    }

    function sendBroadcast() {
      const content = document.getElementById('broadcastContent').value;
      
      if (!content) {
        alert('Please enter a message');
        return;
      }

      ws.send(JSON.stringify({
        type: 'broadcast',
        clientId: myClientId,
        content: content
      }));

      addMessage('broadcast', '📢 You:\n' + content);
      document.getElementById('broadcastContent').value = '';
    }

    function addMessage(type, content) {
      const msgDiv = document.getElementById('messages');
      const msg = document.createElement('div');
      msg.className = 'message ' + type;
      msg.textContent = content;
      msgDiv.appendChild(msg);
      msgDiv.scrollTop = msgDiv.scrollHeight;
    }

    function setStatus(status, text) {
      const statusDiv = document.getElementById('status');
      statusDiv.className = 'status ' + status;
      statusDiv.textContent = (status === 'connected' ? '● ' : '◯ ') + text;
    }

    function updateClientList() {
      const clientsDiv = document.getElementById('clients');
      if (Object.keys(connectedClients).length === 0) {
        clientsDiv.innerHTML = '<div style="text-align: center; color: #999;">No other clients</div>';
        return;
      }

      clientsDiv.innerHTML = '';
      Object.entries(connectedClients).forEach(([clientId, name]) => {
        const item = document.createElement('div');
        item.className = 'client-item';
        item.dataset.clientId = clientId;
        item.innerHTML = `<span>${name}</span><span style="font-size: 0.8em; opacity: 0.7;">${clientId.substring(0, 8)}...</span>`;
        item.onclick = () => {
          document.querySelectorAll('.client-item').forEach(e => e.classList.remove('selected'));
          item.classList.add('selected');
        };
        clientsDiv.appendChild(item);
      });
    }
  </script>
</body>
</html>
